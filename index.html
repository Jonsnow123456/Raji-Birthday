<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Happy Birthday Shamala 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: "Segoe UI", Arial, sans-serif;
    background: black;
    color: white;
  }

  /* ===== PASSWORD ===== */
  #lock {
    position: fixed;
    inset: 0;
    background: #111827;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
  }

  #lock input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
  }

  #lock button {
    margin-top: 15px;
    padding: 10px 28px;
    border-radius: 25px;
    border: none;
    background: #ff4d88;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }

  /* ===== SLIDES ===== */
  .slide {
    position: fixed;
    inset: 0;
    opacity: 0;
    transition: opacity 2s ease;
    background-size: cover;
    background-position: center;
  }

  .slide.active {
    opacity: 1;
    animation: zoomOut 6s ease-out;
  }

  @keyframes zoomOut {
    from { transform: scale(1.06); }
    to   { transform: scale(1); }
  }

  .slide::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: inherit;
    background-size: cover;
    background-position: center;
    filter: blur(22px);
    transform: scale(1.18);
    opacity: 0.38;
  }

  .photo {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .photo img {
    max-width: 92vw;
    max-height: 88vh;
    object-fit: contain;
    filter: drop-shadow(0 22px 45px rgba(0,0,0,0.55));
  }

  h1 {
    position: fixed;
    top: 24px;
    width: 100%;
    text-align: center;
    font-size: 2.4em;
    text-shadow: 0 6px 18px rgba(0,0,0,0.7);
    z-index: 10;
  }

  #cake {
    position: fixed;
    top: 110px;
    width: 100%;
    text-align: center;
    font-size: 90px;
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .fade-out {
    opacity: 0;
    transform: translateY(-12px);
    pointer-events: none;
  }

  #surpriseSong {
    display: none;
    position: fixed;
    bottom: 22px;
    right: 22px;
    background: #ff4d88;
    color: white;
    border: none;
    border-radius: 22px;
    padding: 12px 18px;
    font-size: 14px;
    cursor: pointer;
    z-index: 20;
  }

  #openLetter {
    display: none;
    position: fixed;
    bottom: 22px;
    left: 22px;
    background: #ff4d88;
    border-radius: 50%;
    padding: 16px;
    font-size: 20px;
    cursor: pointer;
    z-index: 20;
  }

  #letter {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    z-index: 400;
  }

  #letterBox {
    background: white;
    color: #9d174d;
    max-width: 520px;
    margin: 60px auto;
    padding: 28px;
    border-radius: 22px;
    line-height: 1.6;
    position: relative;
  }

  #letterBox button {
    position: absolute;
    top: 10px;
    right: 14px;
    border: none;
    background: none;
    font-size: 22px;
    cursor: pointer;
  }

  #finalLine {
    display: none;
    position: fixed;
    inset: 0;
    align-items: center;
    justify-content: center;
    font-size: 2em;
    text-align: center;
    opacity: 0;
    transition: opacity 2s ease;
    z-index: 500;
  }
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="lock">
  <h2>🔐 A Surprise for You 💗</h2>
  <input id="pwd" type="password" placeholder="Password">
  <button type="button" onclick="unlock()">Unlock 🎁</button>
  <p id="error" style="color:#fca5a5;"></p>
</div>

<h1>Happy Birthday Shamoda 🎉</h1>
<div id="cake">🎂</div>

<!-- SLIDES -->
<div class="slide active" style="background-image:url('photos/pic1.jpg')"><div class="photo"><img src="photos/pic1.jpg"></div></div>
<div class="slide" style="background-image:url('photos/pic2.jpg')"><div class="photo"><img src="photos/pic2.jpg"></div></div>
<div class="slide" style="background-image:url('photos/pic3.jpg')"><div class="photo"><img src="photos/pic3.jpg"></div></div>
<div class="slide" style="background-image:url('photos/pic4.jpg')"><div class="photo"><img src="photos/pic4.jpg"></div></div>
<div class="slide" style="background-image:url('photos/pic5.jpg')"><div class="photo"><img src="photos/pic5.jpg"></div></div>
<div class="slide" style="background-image:url('photos/pic6.jpg')"><div class="photo"><img src="photos/pic6.jpg"></div></div>
<div class="slide" style="background-image:url('photos/pic7.jpg')"><div class="photo"><img src="photos/pic7.jpg"></div></div>
<div class="slide" style="background-image:url('photos/pic8.jpg')"><div class="photo"><img src="photos/pic8.jpg"></div></div>
<div class="slide" style="background-image:url('photos/pic9.jpg')"><div class="photo"><img src="photos/pic9.jpg"></div></div>

<!-- BUTTONS -->
<button id="surpriseSong">🎶 Surprise Song</button>
<button id="openLetter" onclick="openLetter()">💌</button>

<!-- LETTER -->
<div id="letter">
  <div id="letterBox">
    <button onclick="closeLetter()">✖</button>
    <strong style="font-size:1.2em;">💖 A message just for you 💖</strong><br><br>
    Dear Shamuuu, Rajiii, Lakshmiii and my Peetha 💕<br><br>
    Wishing you a happy happy birthday! Thank you for all the love and beautiful memories.
    I hope our bond lasts forever 💖<br><br>
    <strong>Your Pappu</strong>
  </div>
</div>

<div id="finalLine">And I’d choose you again… every time.</div>

<!-- ✅ AUDIO (CORRECT) -->
<audio id="voice" src="audio/voice.mp3"></audio>
<audio id="surprise" src="audio/surprise.mp3"></audio>

<script>
  const slides = document.querySelectorAll(".slide");
  let index = 0;

  function startSlides() {
    setInterval(() => {
      slides[index].classList.remove("active");
      index = (index + 1) % slides.length;
      slides[index].classList.add("active");
    }, 6000);
  }

  function unlock() {
    if (document.getElementById("pwd").value === "shamala") {
      document.getElementById("lock").style.display = "none";
      startSlides();
    } else {
      document.getElementById("error").innerText = "Wrong password 💔";
    }
  }

  const cake = document.getElementById("cake");
  const surpriseBtn = document.getElementById("surpriseSong");
  const letterBtn = document.getElementById("openLetter");
  const letter = document.getElementById("letter");
  const finalLine = document.getElementById("finalLine");
  const voice = document.getElementById("voice");
  const surprise = document.getElementById("surprise");

  cake.onclick = () => {
    voice.currentTime = 0;
    voice.play();
    surpriseBtn.style.display = "block";
    letterBtn.style.display = "block";
    cake.classList.add("fade-out");
    setTimeout(() => cake.style.display = "none", 800);
  };

  surpriseBtn.onclick = () => {
    voice.pause();
    surprise.currentTime = 0;
    surprise.play();
  };

  surprise.onended = () => {
    openLetter();
  };

  function openLetter() {
    letter.style.display = "block";
  }

  function closeLetter() {
    letter.style.display = "none";
    finalLine.style.display = "flex";
    setTimeout(() => finalLine.style.opacity = 1, 100);
  }
</script>

</body>
</html>
